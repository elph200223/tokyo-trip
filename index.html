<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>東京 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f3ef;--surface:#fff;--border:#e0dbd2;
    --accent:#8b5e3c;--accent2:#c4956a;--text:#2a2218;
    --text-muted:#999;--visited:#eeebe6;--visited-text:#ccc;
    --header-h:68px;--tab-h:44px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh;}
  header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--bg);border-bottom:1px solid var(--border);z-index:300;padding:12px 16px 8px;box-shadow:0 1px 8px rgba(0,0,0,.06);}
  .header-row{display:flex;align-items:baseline;gap:10px;margin-bottom:3px;}
  h1{font-size:20px;font-weight:900;color:var(--accent);letter-spacing:.04em;outline:none;min-width:60px;}
  h1:focus{border-bottom:1.5px solid var(--accent2);}
  .date-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);outline:none;min-width:40px;}
  .date-badge:focus{border-bottom:1px solid var(--accent2);}
  .stats{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);}
  .stats b{color:var(--accent);font-weight:500;}
  .tabs{position:fixed;top:var(--header-h);left:0;right:0;height:var(--tab-h);background:var(--bg);border-bottom:1px solid var(--border);z-index:299;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex-shrink:0;font-family:'Zen Kaku Gothic New',sans-serif;font-size:12px;font-weight:700;padding:0 14px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;height:100%;transition:color .15s,border-color .15s;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  #panel-map{display:none;position:fixed;top:calc(var(--header-h) + var(--tab-h));left:0;right:0;bottom:0;}
  #panel-map.active{display:block;}
  #map{width:100%;height:100%;}
  .content{display:none;margin-top:calc(var(--header-h) + var(--tab-h));padding:14px 16px 90px;}
  .content.active{display:block;}
  .panel{display:none;}
  .panel.active{display:block;}
  .section-label{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.15em;color:var(--text-muted);text-transform:uppercase;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .section-label:first-child{margin-top:4px;}
  .place-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-bottom:9px;position:relative;overflow:hidden;transition:border-color .15s;}
  .place-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent2);opacity:0;transition:opacity .15s;}
  .place-card:hover{border-color:#c8c0b4;}
  .place-card:hover::before{opacity:1;}
  .place-card.visited{background:var(--visited);border-color:var(--visited);opacity:.55;}
  .place-card.visited::before{background:#bbb;opacity:1;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;}
  .place-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;}
  .place-card.visited .place-name{color:var(--visited-text);text-decoration:line-through;}
  .visit-btn{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:11px;transition:all .15s;}
  .visit-btn:hover{border-color:var(--accent);color:var(--accent);}
  .place-card.visited .visit-btn{background:#ccc;border-color:#ccc;color:white;}
  .place-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:7px;}
  .hours-pill{padding:2px 7px;border-radius:10px;font-size:10px;background:var(--bg);border:1px solid var(--border);}
  .hours-closed{color:#d05030;background:#fff5f2;border-color:#f0c0b0;}
  .hours-open{color:#3a7a50;background:#f2faf5;border-color:#a0d8b0;}
  .place-note{font-size:12px;color:#888;line-height:1.55;margin-bottom:9px;}
  .tags{margin-bottom:8px;}
  .tag{display:inline-block;font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:20px;margin-right:4px;margin-bottom:3px;}
  .tag-warning{background:#fff3e0;color:#b06020;border:1px solid #f0d0a0;}
  .tag-date{background:#e8f4f8;color:#2a7a9a;border:1px solid #b0d8e8;}
  .tag-free{background:#e8f5e8;color:#2a7a3a;border:1px solid #a0d8a0;}
  .card-actions{display:flex;gap:7px;}
  .btn{flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;text-decoration:none;text-align:center;display:block;transition:all .15s;line-height:1;}
  .btn:hover{background:#f0f7f3;border-color:#7ab49a;color:#3a7a5a;}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:white;font-weight:700;}
  .btn-primary:hover{background:#7a5030;border-color:#7a5030;color:white;}
  .btn-danger{background:transparent;border-color:#f0c0b0;color:#d05030;margin-top:7px;}
  .btn-danger:hover{background:#fff5f2;border-color:#d05030;color:#d05030;}
  .checklist-section{margin-bottom:24px;}
  .check-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;transition:all .12s;}
  .check-item:hover{border-color:#c8c0b4;}
  .check-item.checked{opacity:.45;background:var(--visited);}
  .check-box{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .12s;cursor:pointer;}
  .check-item.checked .check-box{background:#aaa;border-color:#aaa;color:white;}
  .check-text{font-size:13px;color:var(--text);flex:1;border:none;background:transparent;outline:none;font-family:'Zen Kaku Gothic New',sans-serif;padding:0;cursor:text;}
  .check-item.checked .check-text{text-decoration:line-through;color:var(--text-muted);}
  .delete-btn{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:#ccc;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;line-height:1;}
  .delete-btn:hover{color:#e07060;background:#fff0ee;}
  .add-item-row{display:flex;gap:8px;margin-top:8px;}
  .add-input{flex:1;padding:9px 12px;border:1px dashed var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:13px;font-family:'Zen Kaku Gothic New',sans-serif;outline:none;transition:border-color .15s;}
  .add-input:focus{border-color:var(--accent2);border-style:solid;}
  .add-input::placeholder{color:var(--text-muted);}
  .add-btn{padding:9px 14px;border-radius:8px;border:1px solid var(--accent2);background:var(--accent2);color:white;font-size:13px;font-weight:700;font-family:'Zen Kaku Gothic New',sans-serif;cursor:pointer;white-space:nowrap;}
  .add-btn:hover{background:var(--accent);border-color:var(--accent);}
  .popup-inner{padding:13px 15px;min-width:190px;font-family:'Zen Kaku Gothic New',sans-serif;}
  .popup-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
  .popup-area{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:4px;}
  .popup-hours{font-size:11px;color:#888;margin-bottom:10px;line-height:1.4;}
  .popup-nav{display:block;width:100%;background:var(--accent);color:white;border:none;border-radius:6px;padding:8px;font-size:12px;font-weight:700;font-family:'Zen Kaku Gothic New',sans-serif;cursor:pointer;text-align:center;text-decoration:none;}
  .gm-style .gm-style-iw-c{padding:0!important;border-radius:10px!important;box-shadow:0 4px 20px rgba(0,0,0,.15)!important;}
  .gm-style .gm-style-iw-d{overflow:hidden!important;}
  .gm-ui-hover-effect{top:4px!important;right:4px!important;}
  .fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:white;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.22);z-index:250;display:flex;align-items:center;justify-content:center;transition:background .15s;line-height:1;}
  .fab:hover{background:#7a5030;}
  .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:400;align-items:flex-end;}
  .modal-overlay.active{display:flex;}
  .modal-sheet{background:var(--surface);border-radius:18px 18px 0 0;padding:20px 16px 40px;width:100%;max-height:90vh;overflow-y:auto;}
  .modal-title{font-size:16px;font-weight:900;color:var(--accent);margin-bottom:16px;}
  .modal-field{margin-bottom:12px;}
  .modal-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
  .modal-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;font-family:'Zen Kaku Gothic New',sans-serif;outline:none;}
  .modal-input:focus{border-color:var(--accent2);}
  .modal-select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;font-family:'Zen Kaku Gothic New',sans-serif;outline:none;appearance:none;}
  .new-cat-box{margin-top:8px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;display:none;}
  .new-cat-box.show{display:block;}
  .emoji-row{display:flex;gap:6px;flex-wrap:wrap;}
  .emoji-opt{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
  .emoji-opt.selected{border-color:var(--accent);background:#f5ede6;}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .pac-container{z-index:500!important;font-family:'Zen Kaku Gothic New',sans-serif!important;border-radius:8px!important;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin 1.1s linear infinite;display:inline-block;}
  .upload-area{border:2px dashed var(--border);border-radius:12px;padding:36px 16px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;}
  .upload-area:hover{border-color:var(--accent2);background:#fdf9f5;}
  .translate-result-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:13px;line-height:1.9;white-space:pre-wrap;color:var(--text);}
  .key-box{background:#fff8f0;border:1px solid #f0d8b8;border-radius:8px;padding:12px 14px;margin-bottom:14px;}
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1 id="trip-title" contenteditable="true" spellcheck="false">東京 2026</h1>
    <span class="date-badge" id="trip-date" contenteditable="true" spellcheck="false">6/3 — 6/7</span>
  </div>
  <div class="stats">候選 <b id="total-count">0</b> 個 · 已去 <b id="visited-count">0</b> 個</div>
</header>
<div class="tabs" id="tabs-bar"></div>
<div id="panel-map" class="active"><div id="map"></div></div>
<div class="content" id="list-content">
  <div id="panel-all" class="panel active"></div>
  <div id="panel-cafe" class="panel"></div>
  <div id="panel-stationery" class="panel"></div>
  <div id="panel-shopping" class="panel"></div>
  <div id="panel-clothes" class="panel"></div>
  <div id="panel-electronics" class="panel"></div>
  <div id="panel-market" class="panel"></div>
  <div id="panel-checklist" class="panel">
    <div class="checklist-section">
      <div class="section-label">行李 — 要帶的東西</div>
      <div id="packing-list"></div>
      <div class="add-item-row">
        <input class="add-input" id="packing-input" placeholder="新增項目..." onkeydown="if(event.key==='Enter')addItem('packing')">
        <button class="add-btn" onclick="addItem('packing')">+ 新增</button>
      </div>
    </div>
    <div class="checklist-section">
      <div class="section-label">行前準備事項</div>
      <div id="prep-list"></div>
      <div class="add-item-row">
        <input class="add-input" id="prep-input" placeholder="新增項目..." onkeydown="if(event.key==='Enter')addItem('prep')">
        <button class="add-btn" onclick="addItem('prep')">+ 新增</button>
      </div>
    </div>
  </div>
  <div id="panel-translate" class="panel">
      <div class="section-label" style="margin-top:4px">📷 拍照或上傳菜單圖片翻譯</div>
      <div class="key-box" id="translate-key-box">
        <div class="modal-label" style="margin-bottom:6px">OpenAI API Key</div>
        <div style="display:flex;gap:8px">
          <input class="add-input" id="openai-key-input" type="password" placeholder="sk-...">
          <button class="add-btn" onclick="saveOpenAIKey()">儲存</button>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:6px">金鑰只存在你的裝置，不會上傳</div>
      </div>
      <div class="upload-area" id="translate-upload-area" onclick="document.getElementById('menu-file-input').click()">
        <div style="font-size:40px;margin-bottom:10px">🍱</div>
        <div style="font-size:14px;font-weight:700;color:var(--accent);margin-bottom:4px">上傳菜單照片</div>
        <div style="font-size:12px;color:var(--text-muted)">點選後可拍照或從相簿選取</div>
        <input type="file" id="menu-file-input" accept="image/*" style="display:none" onchange="onMenuImageSelected(event)">
      </div>
      <div id="translate-preview" style="display:none;margin-top:14px">
        <img id="translate-img" style="width:100%;border-radius:10px;border:1px solid var(--border);display:block">
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn" onclick="clearTranslation()" style="flex:0.5">換一張</button>
          <button class="btn btn-primary" id="translate-btn" onclick="translateMenu()">🔍 翻譯菜單</button>
        </div>
      </div>
      <div id="translate-loading" style="display:none;text-align:center;padding:28px;color:var(--text-muted);font-size:13px">
        <div class="spin" style="font-size:26px;margin-bottom:8px">⟳</div><br>AI 翻譯中…
      </div>
      <div id="translate-result" style="display:none;margin-top:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div class="section-label" style="margin:0">翻譯結果</div>
          <button class="btn" onclick="copyTranslation()" style="flex:0;padding:5px 10px;font-size:11px">複製</button>
        </div>
        <div class="translate-result-box" id="translate-output"></div>
        <div id="translate-key-reset" style="text-align:right;margin-top:8px;display:none">
          <button onclick="resetOpenAIKey()" style="font-size:11px;color:var(--text-muted);background:none;border:none;cursor:pointer;text-decoration:underline">更換 API Key</button>
        </div>
      </div>
      <div id="translate-key-reset-main" style="text-align:right;margin-top:10px;display:none">
        <button onclick="resetOpenAIKey()" style="font-size:11px;color:var(--text-muted);background:none;border:none;cursor:pointer;text-decoration:underline">更換 API Key</button>
      </div>
  </div>
</div>

<button class="fab" onclick="openAddModal()">＋</button>

<div class="modal-overlay" id="add-modal">
  <div class="modal-sheet">
    <div class="modal-title">＋ 新增景點</div>
    <div class="modal-field">
      <div class="modal-label">搜尋地點</div>
      <input class="modal-input" id="new-place-search" placeholder="輸入店名或地址..." autocomplete="off">
    </div>
    <div class="modal-field">
      <div class="modal-label">分類</div>
      <select class="modal-select" id="new-place-category" onchange="onCatSelectChange()"></select>
      <div class="new-cat-box" id="new-cat-box">
        <div class="modal-label" style="margin-bottom:6px;">新分類名稱</div>
        <input class="modal-input" id="new-cat-name" placeholder="例：餐廳、景點、夜市..." style="margin-bottom:8px;">
        <div class="modal-label" style="margin-bottom:6px;">圖示</div>
        <div class="emoji-row" id="cat-emoji-row">
          <div class="emoji-opt selected" data-emoji="📂" onclick="selectCatEmoji(this)">📂</div>
          <div class="emoji-opt" data-emoji="🍜" onclick="selectCatEmoji(this)">🍜</div>
          <div class="emoji-opt" data-emoji="🍣" onclick="selectCatEmoji(this)">🍣</div>
          <div class="emoji-opt" data-emoji="🍰" onclick="selectCatEmoji(this)">🍰</div>
          <div class="emoji-opt" data-emoji="🏛" onclick="selectCatEmoji(this)">🏛</div>
          <div class="emoji-opt" data-emoji="🌸" onclick="selectCatEmoji(this)">🌸</div>
          <div class="emoji-opt" data-emoji="🎮" onclick="selectCatEmoji(this)">🎮</div>
          <div class="emoji-opt" data-emoji="📸" onclick="selectCatEmoji(this)">📸</div>
          <div class="emoji-opt" data-emoji="🎨" onclick="selectCatEmoji(this)">🎨</div>
          <div class="emoji-opt" data-emoji="🏃" onclick="selectCatEmoji(this)">🏃</div>
          <div class="emoji-opt" data-emoji="💄" onclick="selectCatEmoji(this)">💄</div>
          <div class="emoji-opt" data-emoji="🧸" onclick="selectCatEmoji(this)">🧸</div>
        </div>
      </div>
    </div>
    <div class="modal-field">
      <div class="modal-label">地區</div>
      <input class="modal-input" id="new-place-area" placeholder="例：澀谷、銀座">
    </div>
    <div class="modal-field">
      <div class="modal-label">營業時間</div>
      <input class="modal-input" id="new-place-hours" placeholder="例：每天 11:00–20:00">
    </div>
    <div class="modal-field">
      <div class="modal-label">備註</div>
      <input class="modal-input" id="new-place-note" placeholder="想記錄的事...">
    </div>
    <div class="modal-field">
      <div class="modal-label">景點圖示</div>
      <div class="emoji-row" id="place-emoji-row">
        <div class="emoji-opt selected" data-emoji="📍" onclick="selectPlaceEmoji(this)">📍</div>
        <div class="emoji-opt" data-emoji="☕" onclick="selectPlaceEmoji(this)">☕</div>
        <div class="emoji-opt" data-emoji="🍜" onclick="selectPlaceEmoji(this)">🍜</div>
        <div class="emoji-opt" data-emoji="🍣" onclick="selectPlaceEmoji(this)">🍣</div>
        <div class="emoji-opt" data-emoji="🛍" onclick="selectPlaceEmoji(this)">🛍</div>
        <div class="emoji-opt" data-emoji="👕" onclick="selectPlaceEmoji(this)">👕</div>
        <div class="emoji-opt" data-emoji="✏️" onclick="selectPlaceEmoji(this)">✏️</div>
        <div class="emoji-opt" data-emoji="🎪" onclick="selectPlaceEmoji(this)">🎪</div>
        <div class="emoji-opt" data-emoji="🏛" onclick="selectPlaceEmoji(this)">🏛</div>
        <div class="emoji-opt" data-emoji="🌸" onclick="selectPlaceEmoji(this)">🌸</div>
        <div class="emoji-opt" data-emoji="🎮" onclick="selectPlaceEmoji(this)">🎮</div>
        <div class="emoji-opt" data-emoji="📚" onclick="selectPlaceEmoji(this)">📚</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAddModal()" style="flex:0.6">取消</button>
      <button class="btn btn-primary" onclick="saveNewPlace()">儲存景點</button>
    </div>
  </div>
</div>

<script>
const PLACES = [
  {id:'ambre',name:"Café de l'Ambre",category:'cafe',area:'銀座',hours:'週二–日 11:00–20:00',closedDays:[1],note:'東京最老牌純咖啡店，必點 Queen Amber（蛋奶酒咖啡）。',tags:[{text:'週一休',type:'warning'}],lat:35.6679217,lng:139.7622983,emoji:'☕',color:'#d4956a'},

function getAllPlaces() { return [...PLACES, ...customPlaces]; }

// ── Tabs (dynamic) ──
function buildTabDefs() {
  return [
    {id:'map',       label:'🗺 地圖'},
    {id:'all',       label:'全部'},
    ...BASE_CATS.map(c=>({id:c.id, label:c.label})),
    ...customCategories.map(c=>({id:c.id, label:`${c.emoji} ${c.name}`})),
    {id:'checklist', label:'✅ 清單'},
    {id:'translate', label:'🍽 菜單翻譯'},
  ];
}
function renderTabs() {
  document.getElementById('tabs-bar').innerHTML = buildTabDefs().map(t=>
    `<button class="tab ${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function ensurePanels() {
  const lc = document.getElementById('list-content');
  const before = document.getElementById('panel-checklist');
  customCategories.forEach(cat=>{
    if (!document.getElementById(`panel-${cat.id}`)) {
      const div = document.createElement('div');
      div.id = `panel-${cat.id}`;
      div.className = 'panel';
      lc.insertBefore(div, before);
    }
  });
}

function switchTab(tab) {
  currentTab = tab;
  renderTabs();
  const isMap = tab==='map';
  document.getElementById('panel-map').classList.toggle('active', isMap);
  document.getElementById('list-content').classList.toggle('active', !isMap);
  buildTabDefs().slice(1).forEach(t=>{
    const el = document.getElementById(`panel-${t.id}`);
    if (el) el.classList.toggle('active', t.id===tab);
  });
}

// ── Cards & categories ──
function getHoursHTML(place) {
  const today = new Date().getDay();
  if (place.closedDays && place.closedDays.includes(today)) return `<span class="hours-pill hours-closed">今日公休</span>`;
  return `<span class="hours-pill hours-open">${place.hours||'請確認營業時間'}</span>`;
}
function renderCard(place) {
  const isVisited = visitedPlaces.includes(place.id);
  const navUrl  = `https://maps.google.com/?daddr=${place.lat},${place.lng}&dirflg=r`;
  const mapsUrl = `https://maps.google.com/?q=${encodeURIComponent(place.name+' '+place.area+' Tokyo')}`;
  const tags = (place.tags||[]).map(t=>`<span class="tag tag-${t.type}">${t.text}</span>`).join('');
  const del = place.custom?`<button class="btn btn-danger" onclick="deleteCustomPlace('${place.id}')">✕ 移除這個景點</button>`:'';
  return `<div class="place-card ${isVisited?'visited':''}" id="card-${place.id}">
    <div class="card-top"><div class="place-name">${place.emoji} ${place.name}</div>
    <button class="visit-btn" onclick="toggleVisited('${place.id}')">${isVisited?'✓':'○'}</button></div>
    <div class="place-meta"><span>${place.area}</span>${getHoursHTML(place)}</div>
    ${tags?`<div class="tags">${tags}</div>`:''}
    ${place.note?`<div class="place-note">${place.note}</div>`:''}
    <div class="card-actions"><a class="btn" href="${mapsUrl}" target="_blank">查看位置</a><a class="btn btn-primary" href="${navUrl}" target="_blank">→ 導航</a></div>
    ${del}
  </div>`;
}
function renderCategory(cat) {
  const all = getAllPlaces();
  if (cat==='all') {
    return getAllCatDefs().map(c=>{
      const places = all.filter(p=>p.category===c.id);
      if (!places.length) return '';
      return `<div class="section-label">${c.label||c.emoji+' '+c.name}</div>`+places.map(renderCard).join('');
    }).join('');
  }
  return all.filter(p=>p.category===cat).map(renderCard).join('');
}
function renderChecklist() {
  const render=(items,type,id)=>{
    document.getElementById(id).innerHTML=items.map((item,i)=>`
      <div class="check-item ${item.checked?'checked':''}">
        <div class="check-box" onclick="toggleCheck('${type}',${i})">${item.checked?'✓':''}</div>
        <input class="check-text" value="${item.text.replace(/"/g,'&quot;')}" onchange="editItem('${type}',${i},this.value)" ${item.checked?'disabled':''}>
        <button class="delete-btn" onclick="deleteItem('${type}',${i})">×</button>
      </div>`).join('');
  };
  render(packingItems,'packing','packing-list');
  render(prepItems,'prep','prep-list');
}
function toggleCheck(type,i){const a=type==='packing'?packingItems:prepItems;a[i].checked=!a[i].checked;save();renderChecklist();}
function editItem(type,i,v){const a=type==='packing'?packingItems:prepItems;a[i].text=v;save();}
function deleteItem(type,i){if(type==='packing')packingItems.splice(i,1);else prepItems.splice(i,1);save();renderChecklist();}
function addItem(type){const inp=document.getElementById(`${type}-input`);const t=inp.value.trim();if(!t)return;if(type==='packing')packingItems.push({text:t,checked:false});else prepItems.push({text:t,checked:false});inp.value='';save();renderChecklist();}
function toggleVisited(id){visitedPlaces=visitedPlaces.includes(id)?visitedPlaces.filter(v=>v!==id):[...visitedPlaces,id];save();renderAll();}
function deleteCustomPlace(id){
  customPlaces=customPlaces.filter(p=>p.id!==id);save();
  const m=markers[id];if(m)m.marker.map=null;delete markers[id];
  renderAll();
}
function updateStats(){
  document.getElementById('total-count').textContent=getAllPlaces().length;
  document.getElementById('visited-count').textContent=visitedPlaces.length;
}
function renderAll(){
  ensurePanels(); renderTabs();
  ['all',...getAllCatDefs().map(c=>c.id)].forEach(cat=>{
    const el=document.getElementById(`panel-${cat}`);if(el)el.innerHTML=renderCategory(cat);
  });
  renderChecklist();updateStats();updateMapMarkers();
}

// ── Google Maps ──
let map,markers={},openInfoWindow=null;
function makeMarkerEl(place,isVisited){
  const color=isVisited?'#ccc':place.color;
  const opacity=isVisited?0.45:1;
  const shortName=place.name.length>10?place.name.slice(0,10)+'…':place.name;
  const el=document.createElement('div');
  el.style.cssText=`display:flex;flex-direction:column;align-items:center;opacity:${opacity};cursor:pointer`;
  el.innerHTML=`<div style="width:30px;height:30px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;font-size:14px;background:${color}">${place.emoji}</div><div style="margin-top:3px;background:white;color:#2a2218;font-family:'Zen Kaku Gothic New',sans-serif;font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.15);border:1px solid #e0dbd2">${shortName}</div>`;
  return el;
}
function addMarker(place){
  const navUrl=`https://maps.google.com/?daddr=${place.lat},${place.lng}&dirflg=r`;
  const marker=new google.maps.marker.AdvancedMarkerElement({map,position:{lat:place.lat,lng:place.lng},content:makeMarkerEl(place,visitedPlaces.includes(place.id))});
  const iw=new google.maps.InfoWindow({content:`<div class="popup-inner"><div class="popup-name">${place.emoji} ${place.name}</div><div class="popup-area">${place.area}</div><div class="popup-hours">${place.hours||''}</div><a class="popup-nav" href="${navUrl}" target="_blank">→ Google Maps 導航</a></div>`,maxWidth:220});
  marker.addListener('gmp-click',()=>{if(openInfoWindow)openInfoWindow.close();iw.open({anchor:marker,map});openInfoWindow=iw;});
  markers[place.id]={marker,iw};
}
function updateMapMarkers(){
  if(!map)return;
  getAllPlaces().forEach(place=>{const m=markers[place.id];if(m)m.marker.content=makeMarkerEl(place,visitedPlaces.includes(place.id));});
}
function initMap(){
  map=new google.maps.Map(document.getElementById('map'),{center:{lat:35.681,lng:139.752},zoom:12,mapId:'DEMO_MAP_ID'});
  getAllPlaces().forEach(addMarker);
  map.addListener('click',(e)=>{
    if(e.placeId){
      e.stop();
      const svc=new google.maps.places.PlacesService(map);
      svc.getDetails({placeId:e.placeId,fields:['name','geometry','vicinity']},(result,status)=>{
        const ok=status===google.maps.places.PlacesServiceStatus.OK;
        openAddModal({
          name: ok?result.name:'',
          lat:  ok?result.geometry.location.lat():e.latLng.lat(),
          lng:  ok?result.geometry.location.lng():e.latLng.lng(),
          area: ok?result.vicinity?.split(/[,，]/)[0].trim()||'':''
        });
      });
    } else {
      openAddModal({lat:e.latLng.lat(),lng:e.latLng.lng()});
    }
  });
}

let newPlaceLat=null,newPlaceLng=null,placesAC=null,selectedPlaceEmoji='📍',selectedCatEmoji='📂';

function updateCategorySelect(){
  const sel=document.getElementById('new-place-category');
  sel.innerHTML=[
    ...BASE_CATS.map(c=>`<option value="${c.id}">${c.label}</option>`),
    ...customCategories.map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`),

function onCatSelectChange(){
  const isNew=document.getElementById('new-place-category').value==='__new__';
  document.getElementById('new-cat-box').classList.toggle('show',isNew);
}
function openAddModal(prefill){
  document.getElementById('add-modal').classList.add('active');
  document.getElementById('new-place-search').value=prefill?.name||'';
  document.getElementById('new-place-area').value=prefill?.area||'';
  document.getElementById('new-place-hours').value='';
  document.getElementById('new-place-note').value='';
  document.getElementById('new-cat-box').classList.remove('show');
  document.getElementById('new-cat-name').value='';
  newPlaceLat=prefill?.lat??null;newPlaceLng=prefill?.lng??null;
  updateCategorySelect();
  selectPlaceEmoji(document.querySelector('#place-emoji-row .emoji-opt'));
  selectCatEmoji(document.querySelector('#cat-emoji-row .emoji-opt'));
  if(!placesAC&&window.google&&google.maps.places){
    placesAC=new google.maps.places.Autocomplete(document.getElementById('new-place-search'),{componentRestrictions:{country:'jp'},fields:['name','geometry','vicinity']});
    placesAC.addListener('place_changed',()=>{
      const p=placesAC.getPlace();if(!p.geometry)return;
      newPlaceLat=p.geometry.location.lat();newPlaceLng=p.geometry.location.lng();
      document.getElementById('new-place-search').value=p.name;
      if(p.vicinity){document.getElementById('new-place-area').value=p.vicinity.split(/[,，]/)[0].trim();}
    });
  }
}
function closeAddModal(){document.getElementById('add-modal').classList.remove('active');}
function selectPlaceEmoji(el){document.querySelectorAll('#place-emoji-row .emoji-opt').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');selectedPlaceEmoji=el.dataset.emoji;}
function selectCatEmoji(el){document.querySelectorAll('#cat-emoji-row .emoji-opt').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');selectedCatEmoji=el.dataset.emoji;}

function saveNewPlace(){
  const name=document.getElementById('new-place-search').value.trim();
  if(!name){alert('請輸入地點名稱');return;}
  if(!newPlaceLat){alert('請從搜尋建議選擇地點，或直接點擊地圖上的位置');return;}

  let category=document.getElementById('new-place-category').value;
  if(category==='__new__'){
    const catName=document.getElementById('new-cat-name').value.trim();
    if(!catName){alert('請輸入新分類名稱');return;}
    const newCat={
      id:'cat-'+Date.now(), name:catName, emoji:selectedCatEmoji,
      color:EXTRA_CAT_COLORS[customCategories.length%EXTRA_CAT_COLORS.length]
    };
    customCategories.push(newCat);
    category=newCat.id;
  }

  const catDef=getCatDef(category);
  const place={
    id:'custom-'+Date.now(), name, category,
    area: document.getElementById('new-place-area').value.trim()||'東京',
    hours:document.getElementById('new-place-hours').value.trim()||'請確認營業時間',
    note: document.getElementById('new-place-note').value.trim(),
    emoji:selectedPlaceEmoji, color:catDef?.color||'#999',
    lat:newPlaceLat, lng:newPlaceLng,
    tags:[], closedDays:[], custom:true
  };
  customPlaces.push(place);
  save();
  if(map)addMarker(place);
  renderAll();
  closeAddModal();
}

function onMenuImageSelected(e){

  const reader=new FileReader();
  reader.onload=(ev)=>{
    menuImageDataUrl=ev.target.result;

    document.getElementById('translate-result').style.display='none';

  };

  menuImageDataUrl=null;
  document.getElementById('menu-file-input').value='';

  document.getElementById('translate-preview').style.display='none';
  document.getElementById('translate-result').style.display='none';
  document.getElementById('translate-loading').style.display='none';
}
function compressImage(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=1600,scale=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas');
      c.width=img.width*scale;c.height=img.height*scale;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL('image/jpeg',0.88));
    };
    img.src=dataUrl;
  });
}
async function translateMenu(){
  const key=localStorage.getItem('openaiKey');
  if(!key){document.getElementById('translate-key-box').style.display='block';alert('請先輸入 OpenAI API Key');return;}
  if(!menuImageDataUrl)return;
  document.getElementById('translate-loading').style.display='block';
  document.getElementById('translate-result').style.display='none';
  document.getElementById('translate-btn').disabled=true;
  try{
    const img=await compressImage(menuImageDataUrl);
    const res=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body:JSON.stringify({
        model:'gpt-4o-mini',
        messages:[{role:'user',content:[
          {type:'image_url',image_url:{url:img,detail:'auto'}},
          {type:'text',text:'這是日本餐廳的菜單照片。請翻譯成繁體中文，格式：每道菜一行，「日文原文 → 中文（簡短說明食材或口感）」。若菜單有分類（前菜、主菜、甜點等）請保留分類標題。價格若有請一併列出。只輸出翻譯，不需其他說明。'}
        ]}],
        max_tokens:1800
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    document.getElementById('translate-output').textContent=data.choices[0].message.content;
    document.getElementById('translate-result').style.display='block';
    document.getElementById('translate-key-reset').style.display='block';
  }catch(err){
    alert('翻譯失敗：'+err.message);
  }finally{
    document.getElementById('translate-loading').style.display='none';
    document.getElementById('translate-btn').disabled=false;
  }
}
function copyTranslation(){
  const text=document.getElementById('translate-output').textContent;
  navigator.clipboard.writeText(text).then(()=>alert('已複製！')).catch(()=>alert('複製失敗，請手動選取'));
}

renderAll();
initTranslate();
</script>
